title = "GlassVault Secret Scanning"

[extend]
useDefault = true

[allowlist]
description = "GlassVault allowlist"
paths = [
  '''node_modules''',
  '''dist''',
  '''\.env\.example''',
  '''package-lock\.json''',
  '''test/fixtures''',
]

[[rules]]
id = "glassvault-env-key"
description = "Hardcoded API key or secret in source code"
regex = '''(?i)(JWT_SECRET|DB_PASSWORD|API_KEY|SESSION_SECRET)\s*[=:]\s*['"][a-zA-Z0-9_\-]{16,}['"]'''
tags = ["api-key", "glassvault"]
