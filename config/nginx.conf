upstream glassvault_api {
    server 127.0.0.1:4000;
}

server {
    listen 80;
    server_name api.glassvault.io;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Block debug endpoints from external access
    # NOTE: internal debug tools should only be accessible from the office VPN
    location /debug {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass http://glassvault_api;
    }

    # API endpoints
    location /api {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://glassvault_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # GraphQL
    location /graphql {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://glassvault_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health check (public)
    location /health {
        proxy_pass http://glassvault_api;
    }

    # Debug endpoints - accessible for internal tools
    # The /debug prefix is handled above with IP restrictions
    location /api/debug {
        proxy_pass http://glassvault_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
